<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>
    <style>
      :root { font-family: Arial, sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f3f4f6; }
      .card { width: min(380px, 90vw); background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); }
      h1 { margin: 0 0 16px; font-size: 22px; }
      form { display: grid; gap: 12px; }
      label { display: grid; gap: 6px; font-size: 14px; }
      input { border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 12px; font-size: 15px; }
      button { margin-top: 8px; border: none; border-radius: 8px; padding: 10px 12px; background: #2563eb; color: #fff; font-size: 15px; cursor: pointer; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Вход в аккаунт</h1>
      <form id="loginForm">
        <label>Логин <input type="text" name="login" placeholder="Введите логин" required /></label>
        <label>Пароль <input type="password" name="password" placeholder="Введите пароль" required /></label>
        <button type="submit">Войти</button>
      </form>
    </main>

    <script>
      const form = document.getElementById('loginForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());

        try {
          const response = await fetch('https://my-neon-worker.viotlunov.workers.dev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });

          const result = await response.json();
          if (response.ok) {
            alert('Данные в базе!');
            form.reset();
          } else {
            alert(result.error);
          }
        } catch (err) {
          alert('Ошибка сети: Воркер не отвечает');
        }
      });
    </script>
  </body>
</html>
